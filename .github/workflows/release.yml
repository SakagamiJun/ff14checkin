name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        check-latest: true

    - name: Build Binary
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
      run: |
        # 针对 Windows 特殊处理扩展名
        if [ "${{ matrix.os }}" = "windows" ]; then
          go build -o ff14checkin-${{ matrix.os }}-${{ matrix.arch }}.exe .
        else
          go build -o ff14checkin-${{ matrix.os }}-${{ matrix.arch }} .
        fi

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ff14checkin-${{ matrix.os }}-${{ matrix.arch }}
        path: ff14checkin-${{ matrix.os }}-${{ matrix.arch }}*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Display structure of downloaded files
      run: ls -R artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/**/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}